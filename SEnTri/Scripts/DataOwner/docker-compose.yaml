version: "3.9"

services:
  data-owner-db:
      image: redis:latest
      container_name: sentri-client-db
      command: redis-server ../usr/local/etc/redis/redis.conf
      volumes:
        - ./db_data:/data
        - ../SSL/ca-cert.pem:/usr/local/etc/redis/tls/ca-cert.pem
        - ../SSL/redis-cert.pem:/usr/local/etc/redis/tls/redis-cert.pem
        - ../SSL/redis-key.pem:/usr/local/etc/redis/tls/redis-key.pem
        - ../SSL/redis.dh:/usr/local/etc/redis/tls/redis.dh
        - ./DB/redis.conf:/usr/local/etc/redis/redis.conf
      expose:
        - "6379"
      networks:
        - sentri-data-owner-backend
      environment:
        REDIS_TLS_ENABLED: "yes"

    data-owner:
      image: ${DOCKER_REGISTRY}/sentri-data-owner
      container_name: sentri-data-owner
      command: >
        sh -c "echo 'org.apache.tomcat.util.digester.PROPERTY_SOURCE=org.apache.tomcat.util.digester.EnvironmentPropertySource' >> conf/catalina.properties && catalina.sh run"
      volumes:
        - ../SSL/data-owner-truststore.ks:/usr/local/tomcat/ssl/data-owner-truststore.ks
        - ../SSL/data-owner-cert.pem:/usr/local/tomcat/ssl/data-owner-cert.pem
        - ../SSL/data-owner-key.pem:/usr/local/tomcat/ssl/data-owner-key.pem
        #- ./logging.properties:/usr/local/tomcat/conf/logging.properties
        - ./server.xml:/usr/local/tomcat/conf/server.xml
      ports:
        - "8080:8443"
      networks:
        - sentri-data-owner-frontend
        - sentri-proxy-frontend
        - sentri-triplestore-frontend
      env_file:
        - ./system-properties.env
        - ../Secrets/data-owner-secrets.env

volumes:
    db_data:

networks:
  sentri-data-owner-backend:
    name: sentri-data-owner-backend
    driver: bridge
  sentri-data-owner-frontend:
    name: sentri-data-owner-frontend
    driver: bridge
  sentri-proxy-frontend:
    name: sentri-proxy-frontend
    external: true
  sentri-triplestore-frontend:
    name: sentri-triplestore-frontend
    external: true
  