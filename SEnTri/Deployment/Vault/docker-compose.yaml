version: "3.9"

services:
    vault-db:
      image: redis:latest
      container_name: sentri-vault-db
      command: redis-server ../usr/local/etc/redis/redis.conf
      volumes:
        - ./db_data:/data
        - ../SSL/ca-cert.pem:/usr/local/etc/redis/tls/ca-cert.pem
        - ../SSL/redis-cert.pem:/usr/local/etc/redis/tls/redis-cert.pem
        - ../SSL/redis-key.pem:/usr/local/etc/redis/tls/redis-key.pem
        - ../SSL/redis.dh:/usr/local/etc/redis/tls/redis.dh
        - ./DB/redis.conf:/usr/local/etc/redis/redis.conf
      expose:
        - "6379"
      networks:
        - sentri-vault-backend
      environment:
        REDIS_TLS_ENABLED: "yes"

    vault-api:
      depends_on:
        - vault-db
      image: ${DOCKER_REGISTRY}/sentri-vault-api
      container_name: sentri-vault-api
      command: >
        sh -c "echo 'org.apache.tomcat.util.digester.PROPERTY_SOURCE=org.apache.tomcat.util.digester.EnvironmentPropertySource' >> conf/catalina.properties && catalina.sh run"
      volumes:
        - ../SSL/vault-truststore.ks:/usr/local/tomcat/ssl/vault-truststore.ks
        - ../SSL/vault-cert.pem:/usr/local/tomcat/ssl/vault-cert.pem
        - ../SSL/vault-key.pem:/usr/local/tomcat/ssl/vault-key.pem
        - ./server.xml:/usr/local/tomcat/conf/server.xml
      ports:
        - "8080:8443"
      networks:
        - sentri-vault-backend
        - sentri-vault-frontend
        - sentri-iam-provider-frontend
        - sentri-vault-frontend
      env_file:
        - ./system-properties.env
        - ../Secrets/vault-secrets.env

volumes:
    data:

networks:
  sentri-vault-backend:
    name: sentri-vault-backend
    driver: bridge
  sentri-vault-frontend:
    name: sentri-vault-frontend
    driver: bridge
  sentri-iam-provider-frontend:
    name: sentri-iam-provider-frontend
    external: true
  sentri-vault-frontend:
    name: sentri-vault-frontend
    external: true