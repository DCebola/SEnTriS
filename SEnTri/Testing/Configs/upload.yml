config:
  target: 'https://localhost'
  http:
    timeout: 3600 #1hour timeout
  plugins:
    metrics-by-endpoint: 
  processor: "./processor.js"
  variables:
    version:
      - "v1"
      - "v2"
    datasets:
      - "lubm-0"
      - "lubm-1"
      #- "lubm-5"
      #- "lubm-10"
      #- "lubm-20"
  phases:  
    name: "test"
    duration: 1
    arrivalCount: 1

before:
  flow:
    - log: "Initializing SEnTri IAM provider"
    - post:
        url: ":8081/IAMProvider/api/ctrl/init"      
    - post:
        url: ":8080/Client/api/users"
        name: "create-user"
        headers:
          Content-Type: multipart/form-data
        json:
          username: "{{ username }}"
          password: "{{ password }}"
        afterResponse: "processGenUserReply"
        beforeRequest: "genUser"
    - post:                          
        url: ":8080/Client/api/users/auth"
        name: "auth"
        headers:
          Content-Type: multipart/form-data
        json:
          username: "{{ username }}"
          password: "{{ password }}"
        afterResponse: "extractCookie"
    - post:                          
        url: ":8080/Client/api/users/{{ username }}/upgrade"
        name: "issue-upgrade-role-request"
        headers:
          cookie: "[{{ session_cookie }}]"
        json:
          username: "{{ username }}"
          password: "{{ password }}"     
    - post:                          
        url: ":8080/Client/api/users/auth"
        name: "auth"
        headers:
          Content-Type: multipart/form-data
        json:
          username: "admin"
          password: "admin"
        afterResponse: "extractAdminCookie"
    - get:                          
        url: ":8080/Client/api/users/admin/requests"
        name: "list-role-request"
        headers:
          cookie: "[{{ admin_session_cookie }}]"
        afterResponse: "selectRoleRequest"
    - post:                          
        url: ":8080/Client/api/users/admin/requests/{{ role_request_id }}"
        ifTrue: 'role_request_id'
        name: "process-role-request"
        headers:
          Content-Type: multipart/form-data
          cookie: "[{{ admin_session_cookie }}]"

