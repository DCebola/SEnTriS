config:
  target: 'https://localhost'
  http:
    timeout: 3600 #1hour timeout
  plugins:
    metrics-by-endpoint: 
      useOnlyRequestNames: true
  processor: "./processor.js"
  variables:
    protocolEndpoints:
      - ""
      - "/encrypted/v1"
      - "/encrypted/v2"
  phases:
  - name: "Create users"   
    duration: 1
    arrivalCount: 1

before:
  flow:
    - log: "Initializing SEnTri IAM provider"
    - post:
        url: ":8081/IAMProvider/api/ctrl/init"
    - function: "genUser"        
    - post:
        url: ":8080/Client/api/ctrl/users"
        name: "create-user"
        headers:
          Content-Type: multipart/form-data
        json:
          username: "{{ username }}"
          password: "{{ password }}"
        afterResponse: "processGenUserReply"
    - post:                          
        url: ":8080/Client/api/ctrl/users/auth"
        name: "auth"
        headers:
          Content-Type: multipart/form-data
        json:
          username: "{{ username }}"
          password: "{{ password }}"
        afterResponse: "extractCookie"
