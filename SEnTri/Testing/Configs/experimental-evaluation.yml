              cookie: "[{{ session_cookie }}]"
            formData:
              issuer: "{{ username }}"
              triplestoreID: "{{ triplestoreID }}"

          - log: "Uploading dataset"
          - post:                          
            url: ":8080/Client/api/triplestores{{ $loopElement }}/upload?schema=false"
            name: "upload-dataset"
            headers:
              Content-Type: multipart/form-data
              cookie: "[{{ session_cookie }}]"
            beforeRequest: uploadDataset

          - log: "Uploading ontology"
          - post:                          
