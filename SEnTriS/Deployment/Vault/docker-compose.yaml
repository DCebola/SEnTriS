services:
    vault-db:
      image: redis:8.0
      container_name: sentris-vault-db
      command: redis-server /etc/redis/redis.conf
      volumes:
        - ./data:/data/dumb.rdb:u+rwx
        - ../SSL/ca-cert.pem:/etc/certs/ca-cert.pem:ro
        - ../SSL/vault-redis-cert.pem:/etc/certs/redis-cert.pem:ro
        - ../SSL/vault-redis-key.pem:/etc/certs/redis-key.pem:ro
        - ../SSL/vault-redis.dh:/etc/certs/redis.dh:ro
        - ./DB/redis.conf:/etc/redis/redis.conf:ro
      expose:
        - "6379"
      networks:
        - sentris-vault-backend
      environment:
        REDIS_TLS_ENABLED: "yes"
        SKIP_FIX_PERMS: 1

    vault-api:
      depends_on:
        - vault-db
      image: ${DOCKER_REGISTRY}/sentris-vault-api
      container_name: sentris-vault-api
      command: >
        sh -c "echo 'org.apache.tomcat.util.digester.PROPERTY_SOURCE=org.apache.tomcat.util.digester.EnvironmentPropertySource' >> conf/catalina.properties && catalina.sh run"
      volumes:
        - ../SSL/vault-truststore.ks:/usr/local/tomcat/ssl/vault-truststore.ks
        - ../SSL/vault-cert.pem:/usr/local/tomcat/ssl/vault-cert.pem
        - ../SSL/vault-key.pem:/usr/local/tomcat/ssl/vault-key.pem
        - ./server.xml:/usr/local/tomcat/conf/server.xml
        - ./setenv.sh:/usr/local/tomcat/bin/setenv.sh
      expose:
        - "8443"
      networks:
        - sentris-vault-backend
        - sentris-vault-frontend
        - sentris-iam-provider-frontend
      env_file:
        - ./system-properties.env
        - ../Secrets/vault-secrets.env

volumes:
    data:

networks:
  sentris-vault-backend:
    name: sentris-vault-backend
    driver: bridge
  sentris-vault-frontend:
    name: sentris-vault-frontend
    driver: bridge
  sentris-iam-provider-frontend:
    name: sentris-iam-provider-frontend
    external: true